<!DOCTYPE html>

<html lang="en">

    <head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ascii Demo 1 - PyScript</title>
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        /* General Layout */
        body {
    font-family: sans-serif;
    background-color: #f0f0f0;
    margin: 0;
    padding: 0;
    /* No display: flex here anymore! */
}

.page-header {
    background-color: #333;
    color: white;
    padding: 20px;
    text-align: center;
    margin-bottom: 30px;
}

.main-container {
    background-color: #ffffff;
    width: 500px; /* Keep your fixed width */
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    
    /* THIS IS THE KEY: */
    margin: 0 auto; /* 0 top/bottom, 'auto' left/right centers it */
    
    display: flex; /* You can still use flex INSIDE the container for your buttons */
    flex-direction: column;
    gap: 15px;
}

        

        /* Input Rows */
        .input-layout {
            display: flex;
            gap: 10px;
        }

        .input-layout input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        /* Button Rows */
        .button-layout {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .button-layout button, .control-layout button, .main-container > button {
            padding: 8px 12px;
            cursor: pointer;
            border: 1px solid #ccc;
            background-color: #e9e9e9;
            border-radius: 4px;
            transition: background-color 0.2s;
        }

        .button-layout button:hover, .control-layout button:hover:not(:disabled), .main-container > button:hover {
            background-color: #d4d4d4;
        }

        button:disabled {
            background-color: #f5f5f5;
            color: #a0a0a0;
            cursor: not-allowed;
        }

        /* Scroll Area & ASCII Container */
        .scroll-area {
            border: 1px solid #ccc;
            height: 250px;
            overflow-y: auto;
            overflow-x: auto;
            background-color: #fafafa;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .scroll-container {
            font-family: "Courier New", Courier, monospace;
            font-size: 15px;
            text-align: center;
            white-space: pre;
        }

        /* Labels */
        .label-layout {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        #output_label, #rods_label {
            font-weight: bold;
            color: #333;
        }

        /* Playback Controls */
        .control-layout {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        #btn_back {
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    
    <header class="page-header">
        <h1>Basic operations</h1>
        <nav><a href="index.html">← Back to Home</a></nav>
    </header>
    <div class="main-container">
        
        <div class="input-layout">
            <input type="text" id="input_field1" placeholder="first input">
            <input type="text" id="input_field2" placeholder="second input">
        </div>

        <div class="button-layout">
            <button id="process_button">add</button>
            <button id="process_button2">adiro</button>
            <button id="process_button3">-</button>
            <button id="process_button4">sudiro</button>
        </div>

        <div class="button-layout">
            <button id="process_button5">mult - CNS</button>
            <button id="process_button6">mult - JPS</button>
        </div>

        <div class="scroll-area">
            <div id="scroll_container" class="scroll-container"></div>
        </div>

        <div class="label-layout">
            <div id="output_label">output</div>
            <div id="rods_label">rods: 0</div>
        </div>

        <div class="control-layout">
            <button id="clear_button" disabled>Start</button>
            <button id="prev_button" disabled>Previous</button>
            <button id="next_button" disabled>Next</button>
            <button id="play_button" disabled>Play</button>
            <button id="stop_button" disabled>Pause</button>
        </div>

        <button id="btn_back">TO BEAD MODE -></button>

    </div>

    <py-config>
        [[fetch]]
        files = ["asciiConverter1.py", "abacusClass1.py", "integerDataModel.py"]
    </py-config>

<script type="py">
        import asyncio
        from pyscript import document, window
        from pyscript import when
        import asciiConverter1 as ac
        import abacusClass1 as a
        import integerDataModel as m

        # State variables
        current_index = 0
        current_data = []
        is_playing = False

        def checkInput(inp):
            if not inp: return False
            if ord(inp[0]) == 48 and len(inp) > 1:
                return False
            for char in inp:
                if ord(char) < 48 or ord(char) > 57:
                    return False
            return True

        def enable_controls():
            document.getElementById("prev_button").disabled = False
            document.getElementById("next_button").disabled = False
            document.getElementById("clear_button").disabled = False
            document.getElementById("play_button").disabled = False
            document.getElementById("stop_button").disabled = False
        #def update_ab_display, and def update_nb_display for division
        '''update_ab_display():
            if current_data:
                document.getElementById("ab_scroll_container").innerText = book[current_index]
           update_nB_display():
            if current_data:
                document.getElementById("nb_scroll_container").innerText = current_data[current_index]'''
        def update_display():
            if current_data:
                document.getElementById("scroll_container").innerText = current_data[current_index]

        def get_inputs():
            v1 = document.getElementById("input_field1").value
            v2 = document.getElementById("input_field2").value
            if not (checkInput(v1) and checkInput(v2)):
                window.alert("Please enter valid positive integers.")
                return None, None
            return v1, v2
        #division will have current_data be dub[0] 
        #and book will be ac.flipBook(dub[0])
        #actually I think I need to add something 
        #to asciiConverter1 to ignore
        #sublists with $ at index 0
        def process_result(dub, op_char):
            global current_data, current_index, is_playing
            is_playing = False
            
            # dub[0] is the matrix/data, dub[1] is the final string result
            current_data = ac.flipBook(dub[0])
            current_index = 0
            
            val1 = document.getElementById("input_field1").value
            val2 = document.getElementById("input_field2").value
            
            document.getElementById("output_label").innerText = f"{val1} {op_char} {val2} = {dub[1]}"
            document.getElementById("rods_label").innerText = f"rods: {len(dub[0][0])}"
            
            update_display()
            enable_controls()

        # --- MATH OPERATIONS ---

        @when("click", "#process_button")
        def regAdd(event):
            v1, v2 = get_inputs()
            if v1: process_result(m.regAdd(v1, v2), "+")

        @when("click", "#process_button2")
        def adiro(event):
            v1, v2 = get_inputs()
            if v1: process_result(m.adiro(v1, v2), "+")

        @when("click", "#process_button3")
        def minus(event):
            v1, v2 = get_inputs()
            if v1: process_result(m.minus(v1, v2), "-")

        @when("click", "#process_button4")
        def sudiro(event):
            v1, v2 = get_inputs()
            if v1:
                dub = m.sudiro(v1, v2)
                if len(dub) == 1:
                    window.alert("For sudiro the first number must be larger than the second.")
                    return
                process_result(dub, "-")

        @when("click", "#process_button5")
        def mCNS(event):
            v1, v2 = get_inputs()
            if v1:
                dub = m.MultCNS(v1, v2)
                # Note: MultCNS returns (result_str, data) unlike the others
                process_result((dub[1], dub[0]), "×")

        @when("click", "#process_button6")
        def mJPS(event):
            v1, v2 = get_inputs()
            if v1:
                dub = m.multJPS(v1, v2)
                process_result((dub[1], dub[0]), "×")

        # --- PLAYBACK CONTROLS ---

        async def play_frames():
            global current_index, is_playing
            is_playing = True
            
            # Disable interaction during play
            document.getElementById("prev_button").disabled = True
            document.getElementById("next_button").disabled = True
            document.getElementById("play_button").disabled = True
            
            while is_playing and current_index < len(current_data) - 1:
                current_index += 1
                update_display()
                await asyncio.sleep(0.3)
                
            is_playing = False
            enable_controls()

        @when("click", "#play_button")
        def play_click(event):
            if not is_playing and current_data:
                asyncio.ensure_future(play_frames())

        @when("click", "#stop_button")
        def stop_click(event):
            global is_playing
            is_playing = False
        #for division: if current_data[current_index][0] == '$'
        #then
        @when("click", "#next_button")
        def next_click(event):
            global current_index
            if current_data:
                current_index = (current_index + 1) % len(current_data)
                update_display()

        @when("click", "#prev_button")
        def prev_click(event):
            global current_index
            if current_data:
                current_index = (current_index - 1) % len(current_data)
                update_display()

        @when("click", "#clear_button")
        def clear_click(event):
            global current_index, is_playing
            is_playing = False
            if current_data:
                current_index = 0
                update_display()

        @when("click", "#btn_back")
        def switch_mode(event):
            window.alert("Signal Emitted: Switch to Bead Mode requested.")
    </script>
</body>
</html>
