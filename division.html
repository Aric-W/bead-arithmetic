<!DOCTYPE html>

<html lang="en">

    <head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ascii Demo 1 - PyScript</title>
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        /* General Layout */
        body {
    font-family: sans-serif;
    background-color: #f0f0f0;
    margin: 0;
    padding: 0;
    /* No display: flex here anymore! */
}

.page-header {
    background-color: #333;
    color: white;
    padding: 20px;
    text-align: center;
    margin-bottom: 30px;
}

.main-container {
    background-color: #ffffff;
    width: 500px; /* Keep your fixed width */
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    
    /* THIS IS THE KEY: */
    margin: 0 auto; /* 0 top/bottom, 'auto' left/right centers it */
    
    display: flex; /* You can still use flex INSIDE the container for your buttons */
    flex-direction: column;
    gap: 15px;
}

        

        /* Input Rows */
        .input-layout {
            display: flex;
            gap: 10px;
        }

        .input-layout input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        /* Button Rows */
        .button-layout {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .button-layout button, .control-layout button, .main-container > button {
            padding: 8px 12px;
            cursor: pointer;
            border: 1px solid #ccc;
            background-color: #e9e9e9;
            border-radius: 4px;
            transition: background-color 0.2s;
        }

        .button-layout button:hover, .control-layout button:hover:not(:disabled), .main-container > button:hover {
            background-color: #d4d4d4;
        }

        button:disabled {
            background-color: #f5f5f5;
            color: #a0a0a0;
            cursor: not-allowed;
        }

        /* Scroll Area & ASCII Container */
        /*nb-scroll is for images ab-scroll is for text*/
        .scroll-area {
            border: 1px solid #ccc;
            height: 250px;
            overflow-y: auto;
            overflow-x: auto;
            background-color: #fafafa;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .scroll-container {
            font-family: "Courier New", Courier, monospace;
            font-size: 15px;
            text-align: center;
            white-space: pre;
        }

        /* Labels */
        .label-layout {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        #output_label, #rods_label {
            font-weight: bold;
            color: #333;
        }

        /* Playback Controls */
        .control-layout {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        #btn_back {
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    
    <header class="page-header">
        <h1>Basic operations</h1>
        <nav><a href="index.html">← Back to Home</a></nav>
    </header>
    <div class="main-container">
        
        <div class="input-layout">
            <input type="text" id="input_field1" placeholder="first input">
            <input type="text" id="input_field2" placeholder="second input">
        </div>

        <div class="button-layout">
            <button id="process_button">÷</button>
        </div>


        <div class="scroll-area">
            <div id="ab_scroll_container" class="scroll-container"></div>
        </div>

        <div class="scroll-area">
            <div id="nb_scroll_container" class="scroll-container"></div>
        </div>


        <div class="label-layout">
            <div id="output_label">output</div>
            <div id="rods_label">rods: 0</div>
        </div>

        <div class="control-layout">
            <button id="clear_button" disabled>Start</button>
            <button id="prev_button" disabled>Previous</button>
            <button id="next_button" disabled>Next</button>
            <button id="play_button" disabled>Play</button>
            <button id="stop_button" disabled>Pause</button>
        </div>

        <button id="btn_back">TO BEAD MODE -></button>

    </div>

    <py-config>
        [[fetch]]
        files = ["division.py","asciiConverter1.py", "abacusClass1.py", "integerDataModel.py"]
    </py-config>

    <script type="py"src="./division.py"></script>
</body>
</html>
